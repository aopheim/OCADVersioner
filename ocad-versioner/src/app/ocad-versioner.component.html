<div class="container-fluid">
    <div *ngIf="appProgress$ | async as appProgress">
        <div class="progress" style="height: 2px" *ngIf="appProgress.isLoading">
            <div
                class="progress-bar"
                role="progressbar"
                [style.width.%]="appProgress.currentProgress"
                aria-valuenow="appProgress.currentProgress"
                aria-valuemin="0"
                aria-valuemax="100"
            ></div>
        </div>
        <div *ngIf="!appProgress.isLoading" style="height: 2px"></div>
    </div>
    <div class="d-flex justify-content-between align-items-center">
        <h3 class="my-2">{{ '#_OCADVersioner' | translate }}</h3>
        <div>
            <a href="./about" target="_blank">
                <i class="bi bi-book cursorPointer mx-3 h4 noColor"></i>
            </a>
            <i
                class="bi bi-sliders cursorPointer mx-3 h4"
                data-bs-toggle="modal"
                data-bs-target="#appSettingsModal"
            >
            </i>
        </div>
    </div>
    <project-directory-selector
        (projectLoaded)="setSelectedVersion(0)"
    ></project-directory-selector>
    <app-settings-modal></app-settings-modal>
    <div class="row" *ngIf="diffTable$ | async as diffTable">
        <div class="col-md-2 d-flex flex-column">
            <ocad-version-list
                [releases]="(provider.versionMetaDataList$ | async) ?? []"
                (versionNumberSelected)="setSelectedVersion($event)"
                class="flex-grow-1"
            >
            </ocad-version-list>
            <create-version
                *ngIf="(newestVersionMetaData$ | async)?.versionNumber === 0"
                class="mt-auto py-3"
                [fileName]="provider.getCurrentFileName()"
                [newVersionName]="provider.getNewVersionName()"
                [versionDiffMetaData]="{
                    numberOfAddedSymbols: diffTable?.added?.length ?? 0,
                    numberOfEditedSymbols: diffTable?.edited?.length ?? 0,
                    numberOfDeletedSymbols: diffTable?.deleted?.length ?? 0,
                }"
            ></create-version>
        </div>
        <div
            class="col-md-10"
            *ngIf="selectedTableView$ | async as selectedTableView"
        >
            <div class="d-flex justify-content-center">
                <current-version-comparison
                    [newestVersionName]="
                        (newestVersionMetaData$ | async)?.versionName ?? null
                    "
                    [oldestVersionName]="
                        (oldestVersionMetaData$ | async)?.versionName ?? null
                    "
                    [isHistory]="
                        (newestVersionMetaData$ | async)?.versionNumber !== 0
                    "
                ></current-version-comparison>
            </div>
            <ocad-map-viewer
                *ngIf="bboxOfNewestVersion$ | async as bbox"
                [bboxOfMap]="bbox"
                [selectedVersionNumbers]="selectedVersionNumbers$ | async"
            ></ocad-map-viewer>
            <diff-table-tabs
                [diffTable]="diffTable"
                (selectedTableView)="setSelectedTableView($event)"
            ></diff-table-tabs>
            <ocad-diff-table
                [tableInput]="diffTable"
                [tableView]="selectedTableView"
                class="mt-3"
            ></ocad-diff-table>
        </div>
    </div>
</div>
