<div class="container">
  <h3 class="my-2">OCADVersioner</h3>
  <project-directory-selector></project-directory-selector>
  <div class="row">
    <div class="col-md-3">
      <ocad-version-list class="mb-3"> </ocad-version-list>
      <create-version
        [fileName]="provider.getCurrentFileName()"
        [newVersionName]="provider.getNewVersionName()"
      ></create-version>
    </div>
    <div
      class="col-md-9"
      *ngIf="selectedTableView$ | async as selectedTableView"
    >
      <diff-table-tabs></diff-table-tabs>
      <ocad-diff-table
        [tableInput]="diffTable$ | async"
        [tableView]="selectedTableView"
        class="mt-3"
      ></ocad-diff-table>
    </div>
  </div>
</div>
