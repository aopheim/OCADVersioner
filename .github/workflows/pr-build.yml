name: PR build

on:
  pull_request:
    types: [opened]
    branches:
      - main, develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v2

      - name: Use Node.js
        uses: actions/setup-node@v2
        with:
          node-version: "14"

      - name: Install dependencies
        run: yarn install

      - name: Run yarn build:pr
        run: yarn build:pr
