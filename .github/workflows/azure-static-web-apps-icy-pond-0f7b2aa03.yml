name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  create-envfile:
    runs-on: ubuntu-latest
    steps:
      - name: "Create env file"
        run: |
          touch .env
          echo AZURE_APP_CONFIG_CONNECTION_STRING=${{ secrets.AZURE_APP_CONFIG_CONNECTION_STRING }} >> .env
          echo ".env file created and contains: "
          cat .env
      - name: Archive production artifacts
        uses: actions/upload-artifact@v2
        with:
          name: env-file
          path: .env

  build_and_deploy_job:
    needs: create-envfile
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v2
        with:
          name: env-file
          path: .
      - name: Print .env file
        run: cat .env
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ICY_POND_0F7B2AA03 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "/ocad-versioner" # App source code path
          api_location: "" # Api source code path - optional
          output_location: "/dist/ocad-versioner/browser" # Built app content directory - optional
          skip_deploy_on_missing_secrets: true
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ICY_POND_0F7B2AA03 }}
          action: "close"
